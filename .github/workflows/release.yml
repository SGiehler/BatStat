name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2

      - name: Install cargo-wix
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-wix

      - name: Add WiX to PATH
        run: echo "$env:WIX\bin" >> $env:GITHUB_PATH

      - name: Verify WiX on PATH
        run: Get-Command candle.exe

      - name: Run tests
        run: cargo test

      - name: Sync Version in Cargo.toml from Tag
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          (Get-Content Cargo.toml) -replace '^version = ".*"', "version = `"$version`"" | Set-Content Cargo.toml

      - name: Build release binary
        run: cargo build --release

      - name: Create MSI Installer
        run: cargo wix --no-build --nocapture

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/batstat.exe
            target/wix/*.msi
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
